name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gradle-plugin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: false
      - name: Install the release binary
        run: |
          cargo build --release
          echo "$GITHUB_WORKSPACE/target/release" >> "$GITHUB_PATH"
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version-file: '.java-version'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      - name: Build and test Gradle plugin
        run: ./gradlew build --no-daemon
        working-directory: gradle-plugin
      - name: Upload reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: gradle-plugin-reports
          path: gradle-plugin/build/reports
          if-no-files-found: warn
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: gradle-plugin/build/reports/jacoco/test/jacocoTestReport.xml
          flags: gradle-plugin
          fail_ci_if_error: true
  cli:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version-file: '.java-version'
      - name: Build
        run: cargo build --release
      - name: Test and compute coverage
        run: bash scripts/coverage.sh
      - name: Smoke test (SpotBugs jars)
        run: bash scripts/smoke-spotbugs.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: release-artifacts
          path: target/release/
          if-no-files-found: warn
      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-reports
          path: target/coverage/**
          if-no-files-found: warn
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/coverage/lcov.info
          flags: cli
          fail_ci_if_error: true
      - name: Upload smoke test logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: smoke-test-logs
          path: target/smoketest/*.log
          if-no-files-found: warn
      - name: Generate SARIF and SBOM report
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi

          cargo audit --format sarif > target/audit.sarif
        env:
          INSPEQUTE_VALIDATE_SARIF: 1
      - name: Upload SARIF report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: cargo-audit-sarif
          path: target/audit.sarif
          if-no-files-found: warn
  gradle-dependency-submission:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version-file: '.java-version'
      - name: Generate and submit Gradle dependency graph
        uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
        with:
          build-root-directory: gradle-plugin

  upload-code-scanning-sarif:
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: cli
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Download SARIF report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: cargo-audit-sarif
          path: target
      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          sarif_file: target/audit.sarif
